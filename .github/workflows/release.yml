name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0)'
        required: false
        default: '0.0.0.dev0'

jobs:
  build:
    name: Build sdist/wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set package version
        run: uv version ${{ steps.ver.outputs.version }}

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^### \[${VERSION}\]/{found=1; next} found && /^### \[/{exit} found{print}" \
            CHANGELOG.md > release_notes.txt

      - name: Create stable release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_notes.txt

      - name: Force-move dev tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag -f dev
          git push origin dev --force

      - name: Build dev release notes
        if: github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "Development build — not for production use."
            echo "Built from commit \`${{ github.sha }}\` on branch \`${{ github.ref_name }}\`."
            echo ""
            echo "---"
            echo ""
            awk '/^## Upcoming release/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md
          } > dev_release_notes.txt

      - name: Create dev pre-release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev build (${{ inputs.version || github.sha }})
          prerelease: true
          make_latest: false
          files: dist/*
          body_path: dev_release_notes.txt
